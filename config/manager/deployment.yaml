apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-warm-pool-controller
  namespace: sandbox-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-warm-pool-controller
  template:
    metadata:
      labels:
        app: sandbox-warm-pool-controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: sandbox-warm-pool-controller
      containers:
      - name: controller
        image: ghcr.io/G26karthik/sandbox-warm-pool-controller:latest
        args:
        - --metrics-bind-address=:8080
        - --assignment-server-addr=:8081
        - --health-probe-bind-address=:8082
        - --leader-elect=true
        ports:
        - name: metrics
          containerPort: 8080
        - name: assignment
          containerPort: 8081
        - name: healthz
          containerPort: 8082
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
